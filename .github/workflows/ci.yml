name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (stable)
        run: npm run build:stable

      - name: Build (beta)
        run: npm run build:beta

      # Smoke: ensure packaged main/preload/renderer artifacts exist after build
      - name: Smoke — build outputs present
        run: |
          test -f out/main/index.js
          test -f out/preload/index.mjs
          test -f out/renderer/index.html
          echo "build smoke ok"
